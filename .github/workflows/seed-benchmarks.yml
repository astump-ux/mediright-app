name: Seed PKV Tariff Benchmarks

on:
  workflow_dispatch:   # Manuell per Knopfdruck in GitHub Actions Tab
  schedule:
    - cron: '0 3 * * 0'  # Optional: jeden Sonntag 03:00 UTC (für neue pending Einträge)

jobs:
  seed:
    name: Analyse AVB-PDFs & Seed Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tarif-Benchmark Seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/seed-tarif-benchmarks.ts
